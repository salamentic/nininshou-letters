<p class="sensei">By the way, it's said that the word “<span class="note" data-note="This Japanese word Fuzakeru can be written as 巫山戯る. In Chinese, Mount Wu is written as 巫山, i.e. the first two charachters of Fuzakeru.">Fuzakeru</span>” (to be playful) also has that origin.
It has that Kanji because it refers to a man and a woman playing around on Mount Wu.
The world is made up of references.</p>
