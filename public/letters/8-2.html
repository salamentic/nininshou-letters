<p class="boy">祖父は広い家に一人で住んでいます。祖母はいません。数年前大きな怪我をきっかけに入院生活を送って、そのまま亡くなりました。
初めて先生に手紙が、田舎の海を想像すると言ったあれです。
あれは祖父のいる田舎で見た景色です。母の書斎にあった雲に関する本を読んだ時に、それが浮かびました。祖父の家から出て直ぐに畦道があります。僕は祖母とよくそこを歩きました。畦道の向こう側には雲が浮かんでいます。滑らかな白の入道雲です。
雲になってみたいと僕はよく祖母に言いました。青い海の中をとっても気持ちよさそうに泳いでいるように見えたからだと思います。
________________</p>
